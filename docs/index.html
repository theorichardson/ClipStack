<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipStack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.65;
      color: #1d1d1f;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      max-width: 560px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    p {
      font-size: 19px;
      color: #6e6e73;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      font-size: 15px;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f5f5f7; }
      p { color: #6e6e73; }
      a { color: #2997ff; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClipStack</h1>
    <p>Clipboard history for your Mac. Lives in the menu bar. Supports Universal Clipboard from iPhone and iPad.</p>
    <div class="links">
      <a href="https://apps.apple.com/app/clipstack" rel="noopener">Mac App Store</a>
      <a href="privacy">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
