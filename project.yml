name: ClipStack
options:
  bundleIdPrefix: com.theorichardson
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  ClipStack:
    type: application
    platform: macOS
    sources:
      - path: ClipStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theorichardson.ClipStack
        PRODUCT_NAME: ClipStack
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ClipStack
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Theodore Richardson. All rights reserved."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSAccessibilityUsageDescription: ClipStack needs Accessibility access to read and resize other app windows.
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ClipStack/ClipStack.entitlements
        CODE_SIGN_STYLE: Automatic
        # CRITICAL FOR TCC: pin every build (Xcode Run, raw xcodebuild, the
        # install script) to the same Apple Development identity + team.
        # Without this, Xcode/xcodebuild falls back to an ad-hoc signature
        # whose designated requirement (and therefore TCC identity) differs
        # from the dev-cert build at ~/Applications/ClipStack.app — so a
        # permission granted to one copy isn't honored by the other, and the
        # running app prompts again even though System Settings shows it on.
        DEVELOPMENT_TEAM: YW3FCY33TJ
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_PREVIEWS: NO
    dependencies:
      - package: KeyboardShortcuts
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
