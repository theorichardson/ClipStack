name: ClipStack
options:
  bundleIdPrefix: com.theorichardson
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  ClipStack:
    type: application
    platform: macOS
    sources:
      - path: ClipStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theorichardson.ClipStack
        PRODUCT_NAME: ClipStack
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ClipStack
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ClipStack/ClipStack.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: KeyboardShortcuts
